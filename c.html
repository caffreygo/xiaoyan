<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>四连方游戏 · 单击旋转</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #EBEDD4;
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .game-header {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #D9E0D6;
      z-index: 50;
    }
    .game-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #2D593E;
      letter-spacing: 1px;
    }

    .main-container {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 8px;
      overflow: hidden;
    }
    .canvas-board {
      position: relative;
      width: 100%;
      height: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(0,0,0,0.05);
      overflow: hidden;
      touch-action: none;
    }

    .block-unit {
      position: absolute;
      width: var(--grid-size);
      height: var(--grid-size);
      box-sizing: border-box;
      border: 1.5px solid rgba(0, 0, 0, 0.28);
      border-radius: 0px;
    }

    .polyomino-group {
      position: absolute;
      cursor: grab;
      z-index: 20;
      touch-action: none;
      opacity: 0.85;
      transition: opacity 0.15s, filter 0.1s;
    }
    .polyomino-group.selected {
      opacity: 1;
      z-index: 30;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.2));
    }
    .polyomino-group:active { cursor: grabbing; }

    /* 右侧工具栏 */
    #mirror-controls {
      position: fixed;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      flex-direction: column;
      gap: 14px;
      z-index: 200;
    }
    .mirror-btn {
      background: #2D593E;
      color: white;
      padding: 12px 10px;
      border-radius: 36px;
      font-size: 0.75rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,0.25);
      backdrop-filter: blur(4px);
      background: rgba(45, 89, 62, 0.92);
      transition: all 0.1s ease;
      min-width: 68px;
    }
    .mirror-btn:active { transform: scale(0.94); background: #1f3f2e; }

    /* 右下角浮窗 */
    .floating-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(30, 30, 28, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 18px;
      z-index: 250;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.25);
    }
    .size-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .size-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      padding: 4px 10px;
      border-radius: 40px;
    }
    .size-item label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #f0f7ea;
      margin-right: 4px;
    }
    .size-stepper {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      border-radius: 32px;
      padding: 2px 6px;
    }
    .step-btn {
      width: 26px;
      height: 26px;
      background: #2D593E;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .step-btn:active { transform: scale(0.92); background: #1c3b2b; }
    .size-item input {
      width: 48px;
      background: transparent;
      border: none;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: #1e3a2f;
      padding: 4px 0;
      outline: none;
    }
    .size-item span {
      font-size: 0.7rem;
      color: #e0e7d6;
    }
    .action-btn {
      background: #ef4444;
      border: none;
      color: white;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.1s linear;
    }
    .action-btn:active { transform: scale(0.95); background: #dc2626; }
    .check-action-btn {
      background: #2D593E;
      border: none;
      color: white;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.1s linear;
    }
    .check-action-btn:active { transform: scale(0.95); background: #1f4232; }

    @media (max-width: 640px) {
      .floating-controls { padding: 8px 14px; gap: 10px; bottom: 14px; right: 14px; }
      .size-item { padding: 3px 8px; }
      .step-btn { width: 24px; height: 24px; font-size: 0.9rem; }
      .size-item input { width: 44px; font-size: 0.75rem; }
      .action-btn, .check-action-btn { padding: 5px 14px; font-size: 0.75rem; }
      .mirror-btn { padding: 10px 6px; min-width: 58px; font-size: 0.7rem; }
    }

    .target-zone {
      position: absolute;
      border: 3px dashed #A52A2A;
      background: rgba(165, 42, 42, 0.03);
      background-image: 
        linear-gradient(rgba(165, 42, 42, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(165, 42, 42, 0.2) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #A52A2A;
      font-weight: 500;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .victory-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0s, opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .victory-modal.active {
      visibility: visible;
      opacity: 1;
    }
    .victory-card {
      background: linear-gradient(145deg, #ffffff 0%, #fef9e6 100%);
      border-radius: 72px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 40px 60px rgba(0,0,0,0.4), 0 0 0 8px rgba(255,215,0,0.5);
      transform: scale(0.7);
      transition: transform 0.5s ease-out;
      max-width: 85vw;
      border: 2px solid #ffd966;
    }
    .victory-modal.active .victory-card { transform: scale(1); }
    .victory-emoji { font-size: 5rem; margin-bottom: 0.5rem; animation: bounce 0.6s ease infinite alternate; }
    .victory-title { font-size: 2.8rem; font-weight: 800; background: linear-gradient(135deg, #2D593E, #F7B32B); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: 2px; margin-bottom: 0.5rem; }
    .victory-message { font-size: 1.2rem; color: #3c2f1f; font-weight: 500; margin: 0.8rem 0 1.2rem; }
    .victory-btn { background: #2D593E; border: none; padding: 12px 32px; border-radius: 60px; font-size: 1.2rem; font-weight: bold; color: white; cursor: pointer; }
    .victory-btn:active { transform: scale(0.94); background: #1f4232; }
    @keyframes bounce {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-12px); }
    }
    @media (max-width: 550px) {
      .victory-title { font-size: 2rem; }
      .victory-message { font-size: 0.9rem; }
      .victory-card { padding: 1.2rem 1.8rem; border-radius: 48px; }
      .victory-emoji { font-size: 3rem; }
    }
    
    /* 旋转提示 */
    .rotate-hint {
      position: fixed;
      bottom: 30px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      color: #ddd;
      z-index: 200;
      pointer-events: none;
      font-weight: 500;
    }
    @media (max-width: 640px) {
      .rotate-hint { bottom: 80px; font-size: 0.6rem; }
    }
  </style>
</head>
<body>

<header class="game-header">
  <span class="game-title">🧩 四连方游戏 · 单击旋转</span>
</header>

<div id="mirror-controls">
  <div class="mirror-btn" id="mirrorXBtn">🪞 左右</div>
  <div class="mirror-btn" id="cloneBtn">📋 复制</div>
  <div class="mirror-btn" id="mirrorYBtn">🪞 上下</div>
</div>

<div class="floating-controls" id="floating-panel">
  <div class="size-group">
    <div class="size-item">
      <label>📏 宽</label>
      <div class="size-stepper">
        <button class="step-btn" id="width-minus">−</button>
        <input type="number" id="target-width-input" min="2" max="10" value="5" step="1" readonly>
        <button class="step-btn" id="width-plus">+</button>
      </div>
      <span>格</span>
    </div>
    <div class="size-item">
      <label>📐 高</label>
      <div class="size-stepper">
        <button class="step-btn" id="height-minus">−</button>
        <input type="number" id="target-height-input" min="2" max="10" value="4" step="1" readonly>
        <button class="step-btn" id="height-plus">+</button>
      </div>
      <span>格</span>
    </div>
  </div>
  <button class="action-btn" id="reset-floating-btn">⟳ 重置</button>
  <button class="check-action-btn" id="manualCheckBtn">✨ 检查填满 ✨</button>
</div>

<div class="rotate-hint">💡 单击图形 = 旋转90°</div>

<main class="main-container">
  <div class="canvas-board" id="board"></div>
</main>

<div id="victoryModal" class="victory-modal">
  <div class="victory-card">
    <div class="victory-emoji">🏆✨🧩</div>
    <div class="victory-title">挑战成功！</div>
    <div class="victory-message">完美填满 · 无重叠</div>
    <button class="victory-btn" id="closeVictoryBtn">继续挑战</button>
  </div>
</div>
