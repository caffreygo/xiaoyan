<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>四连方交互课件 - 蔚蓝创意版</title>
    <style>
        :root {
            /* 全新蓝色主题色系 */
            --primary-color: #2c7da0;      /* 深海蓝主色 */
            --primary-light: #61a5c2;      /* 明亮天空蓝 */
            --primary-hover: #1f5e7a;       /* 深蓝悬停 */
            --accent-blue: #89c2d9;         /* 柔蓝辅助 */
            --danger-color: #5a6e8a;        /* 灰蓝删除按钮 */
            --danger-hover: #3e4f6b;
            --bg-color: #e8f1f8;            /* 淡蓝白背景 */
            --card-bg: #ffffff;
            --text-color: #1a3b4f;
            --border-color: #bdd4e8;
            --grid-color: #d4e3f0;
            --highlight-color: rgba(44, 125, 160, 0.2);
            --selected-color: rgba(97, 165, 194, 0.5);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', '微软雅黑', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(145deg, #d9e6f2 0%, #eef4fa 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #scale-container {
            width: 1280px;
            height: 720px;
            transform-origin: center center;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: transparent;
            color: #1a5d7a;
            padding: 10px 2rem;
            text-align: center;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .help-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background-color: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .help-btn:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: translateY(-50%) scale(1.02);
        }

        .header h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.08);
            letter-spacing: 2px;
            background: linear-gradient(135deg, #1f5e7a, #2c7da0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .app-wrapper {
            flex: 1;
            background-color: var(--card-bg);
            border: 4px solid var(--border-color);
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0 20px 20px 20px;
            backdrop-filter: blur(0px);
        }

        .controls-bar {
            display: flex;
            align-items: center;
            padding: 12px 28px;
            background-color: #f0f7fc;
            border-bottom: 2px solid var(--border-color);
            gap: 15px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .divider {
            width: 2px;
            height: 28px;
            background-color: #cbdde9;
            margin: 0 8px;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #1f5e7a;
            font-weight: 600;
        }

        .slider-group input[type="range"] {
            width: 130px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .slider-group span {
            display: inline-block;
            width: 24px;
            text-align: center;
            font-weight: bold;
            color: var(--primary-color);
            background: #eef4fa;
            border-radius: 20px;
            padding: 2px 0;
        }

        .main-canvas-container {
            flex: 1;
            display: flex;
            background-color: #fafdff;
            overflow: hidden;
            position: relative;
        }

        #mainCanvas {
            width: 100%;
            height: 100%;
            cursor: default;
            touch-action: none;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            background-color: #e2edf5;
            color: #1f5e7a;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            letter-spacing: 0.5px;
        }

        .btn:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: grayscale(0.1);
        }

        .btn.primary {
            background: linear-gradient(95deg, var(--primary-color), var(--primary-light));
            color: white;
            box-shadow: 0 4px 8px rgba(44, 125, 160, 0.2);
        }

        .btn.primary:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn.danger {
            background-color: var(--danger-color);
            color: white;
        }

        #rotateBtn {
            background-color: #3b82b6;
            color: white;
        }

        #flipBtn {
            background-color: #f59e0b;
            color: white;
        }

        #levelModeBtn {
            background: linear-gradient(135deg, #1e6091, #2c7da0);
            color: white;
            border: none;
        }

        .toast-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
            pointer-events: none;
        }

        .toast {
            background-color: #1e2f3c;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 8px 18px rgba(0,0,0,0.12);
            opacity: 0;
            transform: translateY(-15px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: var(--primary-color);
            box-shadow: 0 4px 12px rgba(44,125,160,0.4);
        }

        .toast.error {
            background: #b91c1c;
        }

        /* 模态框蓝色风格 */
        .modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(30, 60, 80, 0.7);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background-color: white;
            padding: 28px 38px;
            border-radius: 32px;
            width: 460px;
            max-width: 90%;
            position: relative;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2);
            animation: modalFadeIn 0.3s ease;
            border-top: 6px solid var(--primary-color);
        }

        .modal-content h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-left: 5px solid var(--primary-light);
            padding-left: 16px;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-btn {
            position: absolute;
            top: 18px;
            right: 22px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #8aaec0;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--primary-color);
        }

        .instructions p {
            margin: 14px 0;
            line-height: 1.6;
            font-size: 1rem;
        }

        .author-info {
            margin-top: 20px;
            text-align: right;
            color: #6c8da3;
            font-weight: 500;
            font-size: 0.85rem;
        }

        /* 微调滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2edf5;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div id="scale-container">
    <div class="header">
        <button id="helpBtn" class="help-btn">?</button>
        <h1>✨ 四连方·智慧工坊 ✨</h1>
    </div>
    <div class="app-wrapper">
        <div class="main-canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>
        <div class="controls-bar">
            <button id="saveBtn" class="btn primary">💾 保存图形</button>
            <button id="clearCreatorBtn" class="btn">🗑️ 清除制作区</button>
            <div class="divider"></div>
            <div class="slider-group">
                <label for="colSlider">📐 拼图宽</label>
                <input type="range" id="colSlider" min="3" max="12" value="5">
                <span id="colValue">5</span>
            </div>
            <div class="slider-group">
                <label for="rowSlider">📏 拼图高</label>
                <input type="range" id="rowSlider" min="3" max="8" value="4">
                <span id="rowValue">4</span>
            </div>
            <div class="divider"></div>
            <button id="rotateBtn" class="btn" disabled>🔄 旋转图形</button>
            <button id="flipBtn" class="btn" disabled>🪞 翻转图形</button>
            <button id="deleteBtn" class="btn danger" disabled>❌ 删除图形</button>
            <div class="divider"></div>
            <button id="levelModeBtn" class="btn primary" style="background: #2c7da0;">🎮 闯关模式</button>
        </div>
    </div>
    <div id="toastContainer" class="toast-container"></div>
</div>
