<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>提升层作业：瓷盘镶边纹样选型</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #2c7da0;
            --primary-light: #61a5c2;
            --primary-hover: #1f5e7a;
            --danger: #c0473b;
            --bg: #e8f1f8;
            --card-bg: #ffffff;
            --text: #1a3b4f;
            --text-muted: #6c8da3;
            --border: #cdddea;
            --grid-line: #b9d0e2;
            --cell-empty: #f4f9fd;
            --shadow: 0 10px 30px rgba(28, 70, 100, 0.12);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', '微软雅黑', system-ui, sans-serif;
            background: linear-gradient(145deg, #d9e6f2 0%, #eef4fa 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
        }

        .app {
            width: 80%;
            background: var(--card-bg);
            border: 3px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            position: relative;
            padding: 20px 24px;
            text-align: center;
            border-bottom: 2px solid #eef4fa;
        }

        .header h1 {
            margin: 0;
            font-size: clamp(1.3rem, 4vw, 2rem);
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #1f5e7a, #2c7da0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 田字形图标 */
        .tian-icon {
            display: inline-grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2px;
            width: 0.95em;
            height: 0.95em;
            padding: 2px;
            background: #2c7da0;
            border-radius: 4px;
            margin-right: 8px;
            flex-shrink: 0;
            position: relative;
            top: 2px;
        }

        .tian-icon i {
            display: block;
            background: #fff;
            border-radius: 1px;
        }

        .help-btn {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .help-btn:hover {
            background: var(--primary);
            color: #fff;
        }

        .home-btn {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 0 12px;
            height: 38px;
            border-radius: 40px;
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
            font-size: 0.82rem;
            font-weight: 700;
            text-decoration: none;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .home-btn:hover {
            background: var(--primary);
            color: #fff;
        }

        /* 控制栏 */
        .controls-bar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 14px 24px;
            background: #f0f7fc;
            border-bottom: 2px solid var(--border);
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-hover);
        }

        .slider-group input[type="range"] {
            width: 120px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .slider-group .val {
            min-width: 26px;
            text-align: center;
            font-weight: bold;
            color: var(--primary);
            background: #eef4fa;
            border-radius: 20px;
            padding: 2px 6px;
        }

        .divider {
            width: 2px;
            height: 26px;
            background: #cbdde9;
            margin: 0 4px;
        }

        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            background: #e2edf5;
            color: var(--primary-hover);
            transition: all 0.15s;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn.primary {
            background: linear-gradient(95deg, var(--primary), var(--primary-light));
            color: #fff;
        }

        .btn.rotate {
            background: #3b82b6;
            color: #fff;
        }

        .btn.flip {
            background: #f59e0b;
            color: #fff;
        }

        .btn.danger {
            background: var(--danger);
            color: #fff;
        }

        /* 工作区：拼图大挑战 + 图形库 */
        .workspace {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 20px;
            padding: 20px;
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .panel-title {
            padding: 12px 16px;
            background: #fafdff;
            border-bottom: 2px solid #eef4fa;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .panel-title .hint {
            font-size: 0.74rem;
            font-weight: 600;
            color: var(--primary);
            background: #e8f0fe;
            padding: 4px 10px;
            border-radius: 40px;
            white-space: nowrap;
        }

        /* 拼图舞台 */
        .puzzle-stage {
            flex: 1;
            min-height: 380px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 20% 20%, #f4f9fd, #eaf3fb);
        }

        .puzzle-grid {
            display: grid;
            gap: 0;
            border: 2px solid var(--primary);
            border-radius: 6px;
            overflow: hidden;
            touch-action: none;
            box-shadow: 0 6px 18px rgba(44, 125, 160, 0.18);
        }

        .pcell {
            border: 1px solid var(--grid-line);
            background: var(--cell-empty);
            min-width: 0;
            min-height: 0;
        }

        .pcell.filled {
            border-color: rgba(26, 59, 79, 0.5);
        }

        .pcell.preview-ok {
            outline: 2px dashed #2E7D32;
            outline-offset: -3px;
        }

        .pcell.preview-bad {
            outline: 2px dashed #c0473b;
            outline-offset: -3px;
        }

        /* 图形库 */
        .library-list {
            padding: 12px 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            column-gap: 12px;
            row-gap: 6px;
            align-content: start;
        }

        .lib-item {
            overflow: hidden;
        }

        .lib-item {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fafdff;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            touch-action: none;
            transition: transform 0.12s, box-shadow 0.12s;
        }

        .lib-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(44, 125, 160, 0.18);
        }

        .lib-item:active {
            cursor: grabbing;
        }

        .lib-mini {
            display: grid;
            gap: 0;
        }

        .lib-cell {
            width: 36px;
            height: 36px;
            border-radius: 0;
        }

        .lib-cell.filled {
            box-shadow: inset 0 0 0 1px rgba(26, 59, 79, 0.5);
        }

        /* 拖拽幽灵 */
        .ghost {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 3000;
            display: grid;
            gap: 0;
            opacity: 0.85;
        }

        .ghost-cell.filled {
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.4);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 4000;
            pointer-events: none;
            align-items: center;
        }

        .toast {
            background: #1e2f3c;
            color: #fff;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 1.05rem;
            font-weight: 700;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
            opacity: 0;
            transform: translateY(-12px);
            transition: opacity 0.25s, transform 0.25s;
            max-width: 90vw;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: var(--primary);
        }

        .toast.error {
            background: var(--danger);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(30, 60, 80, 0.7);
            backdrop-filter: blur(4px);
            z-index: 5000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #fff;
            padding: 28px 32px;
            border-radius: 24px;
            width: 480px;
            max-width: 100%;
            border-top: 6px solid var(--primary);
            position: relative;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-content h2 {
            margin-top: 0;
            color: var(--primary);
        }

        .modal-content p,
        .modal-content li {
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 1.6rem;
            color: #8aaec0;
            cursor: pointer;
            border: none;
            background: none;
        }

        .close-btn:hover {
            color: var(--primary);
        }

        .modal-content .ok-btn {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        .win-emoji {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 8px;
        }

        @media (max-width: 1400px) {
            .app {
                width: 96%;
            }
        }

        @media (max-width: 820px) {
            body {
                padding: 20px 8px;
            }

            .app {
                width: 96%;
            }

            .workspace {
                grid-template-columns: 1fr;
            }

            .library-list {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <button id="helpBtn" class="help-btn">?</button>
            <h1><span class="tian-icon" aria-hidden="true"><i></i><i></i><i></i><i></i></span>提升层作业：瓷盘镶边纹样选型</h1>
            <a href="index.html" class="home-btn" title="返回主页">🏠 返回主页</a>
        </div>

        <div class="controls-bar">
            <div class="slider-group">
                <span>📐 宽</span>
                <input type="range" id="colSlider" min="3" max="12" value="5">
                <span class="val" id="colValue">5</span>
            </div>
            <div class="slider-group">
                <span>高</span>
                <input type="range" id="rowSlider" min="3" max="8" value="5">
                <span class="val" id="rowValue">5</span>
            </div>
            <div class="divider"></div>
            <button id="rotateBtn" class="btn rotate" disabled>🔄 旋转</button>
            <button id="flipBtn" class="btn flip" disabled>🪞 翻转</button>
            <button id="deleteBtn" class="btn danger" disabled>❌ 删除</button>
            <div class="divider"></div>
            <button id="clearBtn" class="btn">♻️ 清空拼图</button>
        </div>

        <div class="workspace">
            <div class="panel">
                <div class="panel-title"><span>📦 图形库</span></div>
                <div class="library-list" id="libraryList"></div>
            </div>

            <div class="panel">
                <div class="panel-title">
                    <span id="puzzleTitle">🏆 拼图大挑战</span>
                    <span class="hint" id="challengeHint"></span>
                </div>
                <div class="puzzle-stage">
                    <div class="puzzle-grid" id="puzzleGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <div id="helpModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" data-close>&times;</button>
            <h2>📖 玩法说明</h2>
            <p>1. 从右侧 <strong>图形库</strong> 拖动四连方到左侧网格里。</p>
            <p>2. 点击已放置的图形可选中，使用 <strong>旋转 / 翻转 / 删除</strong>。</p>
            <p>3. 拖动调整网格 <strong>宽、高</strong>；当宽和高相等时网格为正方形，否则为长方形。</p>
            <p>4. 目标：用四连方 <strong>无重叠地填满整个网格</strong>，即挑战成功！</p>
            <button class="ok-btn" data-close>开始挑战</button>
        </div>
    </div>

    <div id="winModal" class="modal">
        <div class="modal-content">
            <div class="win-emoji">🏆✨🎉</div>
            <h2 style="text-align:center;border:none;">挑战成功！</h2>
            <p style="text-align:center;" id="winText">你成功填满了整个网格！</p>
            <button class="ok-btn" data-close>太棒了</button>
        </div>
    </div>

    <script>
        (function () {
            /* ---------- 5 种预设四连方 ---------- */
            const SHAPE_DEFS = [
                { name: 'I', color: '#2c7da0', blocks: [[0, 0], [0, 1], [0, 2], [0, 3]] },
                { name: 'O', color: '#f59e0b', blocks: [[0, 0], [0, 1], [1, 0], [1, 1]] },
                { name: 'T', color: '#2E7D32', blocks: [[0, 0], [0, 1], [0, 2], [1, 1]] },
                { name: 'L', color: '#8E24AA', blocks: [[0, 0], [1, 0], [2, 0], [2, 1]] },
                { name: 'S', color: '#c0473b', blocks: [[0, 1], [0, 2], [1, 0], [1, 1]] }
            ].map(s => ({ ...s, blocks: s.blocks.map(([r, c]) => ({ r, c })) }));

            /* ---------- 状态 ---------- */
            let cols = 5, rows = 5;
            let pieces = [];          // 已放置 {id, color, cells:[{r,c}]}
            let selectedId = null;
            let pieceSeq = 0;
            let drag = null;          // {blocks:[{r,c}], color, grab:{r,c}, original}

            /* ---------- DOM ---------- */
            const puzzleGrid = document.getElementById('puzzleGrid');
            const libraryList = document.getElementById('libraryList');
            const colSlider = document.getElementById('colSlider');
            const rowSlider = document.getElementById('rowSlider');
            const colValue = document.getElementById('colValue');
            const rowValue = document.getElementById('rowValue');
            const rotateBtn = document.getElementById('rotateBtn');
            const flipBtn = document.getElementById('flipBtn');
            const deleteBtn = document.getElementById('deleteBtn');
            const clearBtn = document.getElementById('clearBtn');
            const helpBtn = document.getElementById('helpBtn');
            const challengeHint = document.getElementById('challengeHint');
            const puzzleTitle = document.getElementById('puzzleTitle');
            const toastContainer = document.getElementById('toastContainer');
            const helpModal = document.getElementById('helpModal');
            const winModal = document.getElementById('winModal');
            const winText = document.getElementById('winText');

            /* ---------- 工具 ---------- */
            function toast(msg, type = '') {
                const el = document.createElement('div');
                el.className = 'toast ' + type;
                el.textContent = msg;
                toastContainer.appendChild(el);
                requestAnimationFrame(() => el.classList.add('show'));
                setTimeout(() => {
                    el.classList.remove('show');
                    setTimeout(() => el.remove(), 300);
                }, 2000);
            }

            function normalize(blocks) {
                const minR = Math.min(...blocks.map(b => b.r));
                const minC = Math.min(...blocks.map(b => b.c));
                return blocks.map(b => ({ r: b.r - minR, c: b.c - minC }));
            }

            function occupiedSet(excludeId) {
                const set = new Set();
                for (const p of pieces) {
                    if (p.id === excludeId) continue;
                    for (const c of p.cells) set.add(c.r + ',' + c.c);
                }
                return set;
            }

            function canPlace(cells, excludeId) {
                const occ = occupiedSet(excludeId);
                return cells.every(c =>
                    c.r >= 0 && c.r < rows && c.c >= 0 && c.c < cols && !occ.has(c.r + ',' + c.c)
                );
            }

            // 仅判断是否在网格范围内（允许重叠）
            function inBounds(cells) {
                return cells.every(c => c.r >= 0 && c.r < rows && c.c >= 0 && c.c < cols);
            }

            // 整体评估：是否有重叠 / 是否无重叠地填满
            function evaluate() {
                const count = {};
                for (const p of pieces) {
                    for (const c of p.cells) {
                        if (c.r < 0 || c.r >= rows || c.c < 0 || c.c >= cols) continue;
                        const k = c.r + ',' + c.c;
                        count[k] = (count[k] || 0) + 1;
                    }
                }
                const overlap = Object.values(count).some(v => v > 1);
                const filled = Object.keys(count).length;
                return { overlap, full: filled === cols * rows && !overlap };
            }

            /* ---------- 渲染网格 ---------- */
            function buildGrid() {
                puzzleGrid.innerHTML = '';
                puzzleGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                puzzleGrid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
                puzzleGrid.style.aspectRatio = `${cols} / ${rows}`;
                // 用最大高度约束，宽度尽量撑满可用空间：
                // 宽=高时整体为正方形，否则长方形；格子始终为正方形
                const MAX_H = 360; // 拼图网格的最大高度（像素）
                if (cols >= rows) {
                    // 宽 >= 高：高度按比例由宽度推导，宽度最多撑满，但高度不超过 MAX_H
                    puzzleGrid.style.width = `min(100%, ${Math.round(MAX_H * cols / rows)}px)`;
                    puzzleGrid.style.height = 'auto';
                    puzzleGrid.style.maxWidth = '';
                    puzzleGrid.style.maxHeight = '';
                } else {
                    // 高 > 宽：高度封顶 MAX_H，宽度按比例推导
                    puzzleGrid.style.height = `min(100%, ${MAX_H}px)`;
                    puzzleGrid.style.width = 'auto';
                    puzzleGrid.style.maxWidth = '100%';
                    puzzleGrid.style.maxHeight = '';
                }

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'pcell';
                        cell.dataset.r = r;
                        cell.dataset.c = c;
                        puzzleGrid.appendChild(cell);
                    }
                }
                paintPieces();
            }

            function cellAt(r, c) {
                if (r < 0 || r >= rows || c < 0 || c >= cols) return null;
                return puzzleGrid.children[r * cols + c];
            }

            function paintPieces() {
                for (const cell of puzzleGrid.children) {
                    cell.className = 'pcell';
                    cell.style.background = '';
                    cell.style.boxShadow = '';
                }
                for (const p of pieces) {
                    for (const c of p.cells) {
                        const cell = cellAt(c.r, c.c);
                        if (!cell) continue;
                        cell.classList.add('filled');
                        cell.style.background = p.color;
                    }
                }
                // 选中图形：仅在外缘（不与同图形相邻的边）高亮
                const sel = pieces.find(p => p.id === selectedId);
                if (sel) {
                    const set = new Set(sel.cells.map(c => c.r + ',' + c.c));
                    const C = '#00c8ff', W = 3;
                    for (const c of sel.cells) {
                        const cell = cellAt(c.r, c.c);
                        if (!cell) continue;
                        const shadows = [];
                        if (!set.has((c.r - 1) + ',' + c.c)) shadows.push(`inset 0 ${W}px 0 0 ${C}`);
                        if (!set.has((c.r + 1) + ',' + c.c)) shadows.push(`inset 0 -${W}px 0 0 ${C}`);
                        if (!set.has(c.r + ',' + (c.c - 1))) shadows.push(`inset ${W}px 0 0 0 ${C}`);
                        if (!set.has(c.r + ',' + (c.c + 1))) shadows.push(`inset -${W}px 0 0 0 ${C}`);
                        if (shadows.length) cell.style.boxShadow = shadows.join(', ');
                    }
                }
            }

            /* ---------- 图形库 ---------- */
            function buildLibrary() {
                libraryList.innerHTML = '';
                SHAPE_DEFS.forEach((shape, idx) => {
                    const item = document.createElement('div');
                    item.className = 'lib-item';
                    item.dataset.idx = idx;

                    const blocks = normalize(shape.blocks);
                    const maxR = Math.max(...blocks.map(b => b.r));
                    const maxC = Math.max(...blocks.map(b => b.c));
                    const r = maxR + 1, cc = maxC + 1;

                    const mini = document.createElement('div');
                    mini.className = 'lib-mini';
                    mini.style.gridTemplateColumns = `repeat(${cc}, 36px)`;
                    mini.style.gridTemplateRows = `repeat(${r}, 36px)`;

                    const filled = new Set(blocks.map(b => b.r + ',' + b.c));
                    for (let rr = 0; rr < r; rr++) {
                        for (let ccol = 0; ccol < cc; ccol++) {
                            const mc = document.createElement('div');
                            mc.className = 'lib-cell';
                            if (filled.has(rr + ',' + ccol)) {
                                mc.classList.add('filled');
                                mc.style.background = shape.color;
                            }
                            mini.appendChild(mc);
                        }
                    }
                    item.appendChild(mini);
                    item.addEventListener('pointerdown', e => startDragFromLibrary(e, idx));
                    libraryList.appendChild(item);
                });
            }

            /* ---------- 拖拽 ---------- */
            let ghostEl = null;

            function makeGhost(blocks, color) {
                removeGhost();
                const maxR = Math.max(...blocks.map(b => b.r));
                const maxC = Math.max(...blocks.map(b => b.c));
                const size = currentCellSize();
                const g = document.createElement('div');
                g.className = 'ghost';
                g.style.gridTemplateColumns = `repeat(${maxC + 1}, ${size}px)`;
                g.style.gridTemplateRows = `repeat(${maxR + 1}, ${size}px)`;
                const filled = new Set(blocks.map(b => b.r + ',' + b.c));
                for (let r = 0; r <= maxR; r++) {
                    for (let c = 0; c <= maxC; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'ghost-cell';
                        if (filled.has(r + ',' + c)) {
                            cell.classList.add('filled');
                            cell.style.background = color;
                        }
                        g.appendChild(cell);
                    }
                }
                document.body.appendChild(g);
                ghostEl = g;
            }

            function removeGhost() {
                if (ghostEl) { ghostEl.remove(); ghostEl = null; }
            }

            function currentCellSize() {
                const rect = puzzleGrid.getBoundingClientRect();
                return rect.width / cols;
            }

            function moveGhost(clientX, clientY) {
                if (!ghostEl || !drag) return;
                const size = currentCellSize();
                const left = clientX - (drag.grab.c + 0.5) * size;
                const top = clientY - (drag.grab.r + 0.5) * size;
                ghostEl.style.transform = `translate(${left}px, ${top}px)`;
            }

            function startDragFromLibrary(e, idx) {
                e.preventDefault();
                const shape = SHAPE_DEFS[idx];
                const blocks = normalize(shape.blocks);
                // 抓取点设为图形中心附近的块
                const grab = blocks[0];
                drag = { blocks, color: shape.color, grab, original: null };
                makeGhost(blocks, shape.color);
                moveGhost(e.clientX, e.clientY);
            }

            function startDragFromGrid(e, piece, clickedR, clickedC) {
                e.preventDefault();
                const blocks = normalize(piece.cells);
                const minR = Math.min(...piece.cells.map(c => c.r));
                const minC = Math.min(...piece.cells.map(c => c.c));
                const grab = { r: clickedR - minR, c: clickedC - minC };
                // 暂时移除，拖拽结束再决定放置或还原
                pieces = pieces.filter(p => p.id !== piece.id);
                drag = { blocks, color: piece.color, grab, original: piece };
                paintPieces();
                makeGhost(blocks, piece.color);
                moveGhost(e.clientX, e.clientY);
            }

            function hoveredCell(clientX, clientY) {
                const rect = puzzleGrid.getBoundingClientRect();
                const size = currentCellSize();
                const c = Math.floor((clientX - rect.left) / size);
                const r = Math.floor((clientY - rect.top) / size);
                return { r, c, inside: clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom };
            }

            function clearPreview() {
                for (const cell of puzzleGrid.children) {
                    cell.classList.remove('preview-ok', 'preview-bad');
                }
            }

            function updatePreview(clientX, clientY) {
                clearPreview();
                if (!drag) return;
                const h = hoveredCell(clientX, clientY);
                if (!h.inside) return;
                const originR = h.r - drag.grab.r;
                const originC = h.c - drag.grab.c;
                const cells = drag.blocks.map(b => ({ r: originR + b.r, c: originC + b.c }));
                const ok = inBounds(cells);
                cells.forEach(c => {
                    const cell = cellAt(c.r, c.c);
                    if (cell) cell.classList.add(ok ? 'preview-ok' : 'preview-bad');
                });
            }

            function onPointerMove(e) {
                if (!drag) return;
                e.preventDefault();
                moveGhost(e.clientX, e.clientY);
                updatePreview(e.clientX, e.clientY);
            }

            function onPointerUp(e) {
                if (!drag) return;
                const h = hoveredCell(e.clientX, e.clientY);
                let placed = false;
                if (h.inside) {
                    const originR = h.r - drag.grab.r;
                    const originC = h.c - drag.grab.c;
                    const cells = drag.blocks.map(b => ({ r: originR + b.r, c: originC + b.c }));
                    if (inBounds(cells)) {
                        const id = ++pieceSeq;
                        pieces.push({ id, color: drag.color, cells });
                        selectedId = id;
                        placed = true;
                    }
                }
                if (!placed && drag.original) {
                    // 还原被拿起的图形
                    pieces.push(drag.original);
                    selectedId = drag.original.id;
                } else if (!placed && !drag.original && h.inside) {
                    toast('这里放不下哦', 'error');
                }
                drag = null;
                removeGhost();
                clearPreview();
                paintPieces();
                updateToolbar();
                if (placed) checkWin();
            }

            /* 点击网格选中 / 拿起图形 */
            function onGridPointerDown(e) {
                const target = e.target.closest('.pcell');
                if (!target) return;
                const r = +target.dataset.r;
                const c = +target.dataset.c;
                const piece = pieces.find(p => p.cells.some(cc => cc.r === r && cc.c === c));
                if (piece) {
                    selectedId = piece.id;
                    paintPieces();
                    updateToolbar();
                    startDragFromGrid(e, piece, r, c);
                } else {
                    selectedId = null;
                    paintPieces();
                    updateToolbar();
                }
            }

            /* ---------- 旋转 / 翻转 / 删除 ---------- */
            function selectedPiece() {
                return pieces.find(p => p.id === selectedId);
            }

            function transformSelected(fn, msg) {
                const p = selectedPiece();
                if (!p) return;
                const minR = Math.min(...p.cells.map(c => c.r));
                const minC = Math.min(...p.cells.map(c => c.c));
                const local = p.cells.map(c => ({ r: c.r - minR, c: c.c - minC }));
                const transformed = normalize(fn(local));
                const newCells = transformed.map(b => ({ r: minR + b.r, c: minC + b.c }));
                // 越界则整体回拉
                let cells = newCells;
                const maxR = Math.max(...cells.map(c => c.r));
                const maxC = Math.max(...cells.map(c => c.c));
                let dr = 0, dc = 0;
                if (maxR >= rows) dr = rows - 1 - maxR;
                if (maxC >= cols) dc = cols - 1 - maxC;
                const minNR = Math.min(...cells.map(c => c.r)) + dr;
                const minNC = Math.min(...cells.map(c => c.c)) + dc;
                if (minNR < 0) dr -= minNR;
                if (minNC < 0) dc -= minNC;
                cells = cells.map(c => ({ r: c.r + dr, c: c.c + dc }));
                // 允许重叠：仅保证在网格内，直接应用
                p.cells = cells;
                paintPieces();
                checkWin();
            }

            function rotate(local) {
                const maxR = Math.max(...local.map(p => p.r));
                return local.map(p => ({ r: p.c, c: maxR - p.r }));
            }
            function flip(local) {
                const maxC = Math.max(...local.map(p => p.c));
                return local.map(p => ({ r: p.r, c: maxC - p.c }));
            }

            function deleteSelected() {
                if (selectedId == null) return;
                pieces = pieces.filter(p => p.id !== selectedId);
                selectedId = null;
                paintPieces();
                updateToolbar();
                checkWin();
            }

            function updateToolbar() {
                const has = selectedId != null && selectedPiece();
                rotateBtn.disabled = !has;
                flipBtn.disabled = !has;
                deleteBtn.disabled = !has;
            }

            /* ---------- 胜负（需无重叠且填满） ---------- */
            let wasWon = false;
            function checkWin() {
                const { full } = evaluate();
                if (full && !wasWon) {
                    winText.textContent = `你用 ${pieces.length} 块四连方填满了 ${cols}×${rows} 的网格！`;
                    winModal.classList.add('show');
                    toast('🎉 挑战成功！', 'success');
                }
                wasWon = full;
            }

            /* ---------- 挑战提示 ---------- */
            function updateHint() {
                puzzleTitle.textContent = (cols === rows ? '🟦 正方形拼摆' : '🟧 长方形拼摆');
                const total = cols * rows;
                if (total % 4 === 0) {
                    challengeHint.textContent = `填满 ${cols}×${rows}（需 ${total / 4} 块）`;
                } else {
                    challengeHint.textContent = `${cols}×${rows}（${total} 格不是 4 的倍数，无法完全填满）`;
                }
            }

            /* ---------- 事件 ---------- */
            function applySize() {
                cols = +colSlider.value;
                rows = +rowSlider.value;
                colValue.textContent = cols;
                rowValue.textContent = rows;
                pieces = [];
                selectedId = null;
                wasWon = false;
                buildGrid();
                updateToolbar();
                updateHint();
            }

            colSlider.addEventListener('input', applySize);
            rowSlider.addEventListener('input', applySize);
            rotateBtn.addEventListener('click', () => transformSelected(rotate, '旋转'));
            flipBtn.addEventListener('click', () => transformSelected(flip, '翻转'));
            deleteBtn.addEventListener('click', deleteSelected);
            clearBtn.addEventListener('click', () => {
                pieces = [];
                selectedId = null;
                wasWon = false;
                paintPieces();
                updateToolbar();
                toast('已清空拼图');
            });

            puzzleGrid.addEventListener('pointerdown', onGridPointerDown);
            window.addEventListener('pointermove', onPointerMove, { passive: false });
            window.addEventListener('pointerup', onPointerUp);
            window.addEventListener('resize', () => { /* 网格用比例布局，重绘幽灵尺寸即可 */ });

            helpBtn.addEventListener('click', () => helpModal.classList.add('show'));
            document.querySelectorAll('[data-close]').forEach(el => {
                el.addEventListener('click', () => {
                    el.closest('.modal').classList.remove('show');
                });
            });
            [helpModal, winModal].forEach(m => {
                m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); });
            });

            /* ---------- 初始化 ---------- */
            buildLibrary();
            applySize();
        })();
    </script>
</body>

</html>
