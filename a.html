<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>基础层作业：瓷饰半成品AI智能质检</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-blue: #1E88E5;
            --primary-green: #2E7D32;
            --primary-red: #C62828;
            --bg-white: #FFFFFF;
            --bg-page: #ECEFF1;
            --border-soft: #E2E8F0;
            --text-dark: #1A2C3E;
            --text-muted: #546E7A;
            --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', '微软雅黑', system-ui, sans-serif;
            padding: 64px 16px 32px;
            color: var(--text-dark);
        }

        .app {
            width: 80%;
            background: var(--bg-white);
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 2px solid #EEF2F6;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            font-weight: 700;
        }

        .top-bar .emoji { font-size: 1.6rem; }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        .panel {
            border: 1px solid var(--border-soft);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
            min-height: 520px;
        }

        .panel-header {
            padding: 12px 16px;
            background: #FAFCFD;
            font-weight: 700;
            font-size: 1rem;
            border-bottom: 2px solid #EEF2F6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .limit-counter {
            font-size: 0.78rem;
            background: #E8F0FE;
            padding: 4px 12px;
            border-radius: 40px;
            color: var(--primary-blue);
            font-weight: 600;
            white-space: nowrap;
        }

        .panel-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        /* 制作区 5x5 网格 */
        .creator-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 0;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            aspect-ratio: 1 / 1;
            border: 2px solid #CBD5E1;
        }

        .cell {
            border: 1px solid #CBD5E1;
            border-radius: 0;
            background: var(--bg-white);
            cursor: pointer;
            transition: background 0.12s, transform 0.08s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--primary-blue);
            min-width: 0;
            min-height: 0;
        }

        .cell:hover { background: #F1F6FE; }
        .cell:active { transform: scale(0.94); }
        .cell.selected {
            background: #BBDEFB;
            border-color: var(--primary-blue);
        }

        .hint {
            font-size: 0.82rem;
            text-align: center;
            color: var(--text-muted);
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.15s;
            background: #F1F5F9;
            color: var(--text-dark);
            flex: 1;
            min-width: 120px;
        }
        .btn-primary { background: var(--primary-blue); color: #fff; }
        .btn:active { transform: translateY(1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* 图形库 */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
            gap: 14px;
        }

        .library-empty {
            color: var(--text-muted);
            font-size: 0.88rem;
            text-align: center;
            padding: 24px 8px;
            border: 2px dashed #D7E0EA;
            border-radius: 14px;
        }

        .shape-card {
            position: relative;
            border: 1px solid var(--border-soft);
            border-radius: 14px;
            padding: 10px;
            background: #FAFCFD;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }

        .shape-mini {
            display: grid;
            gap: 0;
        }

        .mini-cell { width: 40px; height: 40px; border-radius: 0; }
        .mini-cell.filled { box-shadow: inset 0 0 0 1px rgba(26, 59, 79, 0.5); }

        .delete-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            background: var(--primary-red);
            color: #fff;
            font-size: 0.9rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.85;
            transition: opacity 0.15s, transform 0.08s;
        }
        .delete-btn:hover { opacity: 1; }
        .delete-btn:active { transform: scale(0.9); }

        .toast {
            position: fixed;
            top: 150px;
            left: 50%;
            transform: translateX(-50%) translateY(-12px);
            background: #1E2A3A;
            color: #fff;
            padding: 16px 36px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.15rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            max-width: 90vw;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 680px) {
            body { padding: 12px 8px; }
            .app { width: 96%; }
            .workspace {
                grid-template-columns: 1fr;
                gap: 16px;
                padding: 14px;
            }
            .top-bar { padding: 14px 18px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <span class="emoji">🧩</span>
        <h1>基础层作业：瓷饰半成品AI智能质检</h1>
    </div>

    <div class="workspace">
        <div class="panel">
            <div class="panel-header">🎨 四连方实验室 (5×5)</div>
            <div class="panel-body">
                <div class="creator-grid" id="creatorGrid"></div>
                <div class="hint">✏️ 点击 4 个相邻方格 → 保存图形</div>
                <div class="toolbar">
                    <button id="saveShapeBtn" class="btn btn-primary">💾 保存图形</button>
                    <button id="clearCreatorBtn" class="btn">🗑️ 清除制作区</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span>📦 四连方”纹样库</span>
                <span class="limit-counter" id="libraryCounter">0 / 5</span>
            </div>
            <div class="panel-body">
                <div id="libraryContainer"></div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
(function () {
    const GRID_SIZE = 5;
    const MAX_SHAPES = 5;
    const SHAPE_CELLS = 4;
    const COLORS = ['#1E88E5', '#2E7D32', '#C62828', '#F9A825', '#8E24AA', '#D81B60', '#5E35B1'];

    let selectedCells = [];   // 制作区选中的格子 [{r, c}]
    let library = [];         // 已保存图形 [{id, color, blocks, shapeKey}]
    let colorIndex = 0;

    const creatorGrid = document.getElementById('creatorGrid');
    const libraryContainer = document.getElementById('libraryContainer');
    const libraryCounter = document.getElementById('libraryCounter');
    const saveShapeBtn = document.getElementById('saveShapeBtn');
    const clearCreatorBtn = document.getElementById('clearCreatorBtn');
    const toastEl = document.getElementById('toast');

    let toastTimer = null;
    function toast(msg, isError = false) {
        toastEl.textContent = msg;
        toastEl.style.background = isError ? '#C62828' : '#2E7D32';
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { toastEl.classList.remove('show'); }, 2200);
    }

    function nextColor() {
        const color = COLORS[colorIndex % COLORS.length];
        colorIndex++;
        return color;
    }

    // 归一化：平移到左上角并排序
    function normalize(blocks) {
        if (!blocks.length) return [];
        const minR = Math.min(...blocks.map(b => b.r));
        const minC = Math.min(...blocks.map(b => b.c));
        return blocks
            .map(b => ({ r: b.r - minR, c: b.c - minC }))
            .sort((a, b) => (a.r !== b.r ? a.r - b.r : a.c - b.c));
    }

    // 生成包含旋转 + 镜像的规范键，用于去重
    function canonicalKey(blocks) {
        const base = normalize(blocks);
        const variants = [];

        const rotate = pts => {
            const maxR = Math.max(...pts.map(p => p.r));
            return pts.map(p => ({ r: p.c, c: maxR - p.r }));
        };
        const mirror = pts => {
            const maxC = Math.max(...pts.map(p => p.c));
            return pts.map(p => ({ r: p.r, c: maxC - p.c }));
        };

        let cur = base;
        for (let i = 0; i < 4; i++) {
            variants.push(cur);
            cur = rotate(cur);
        }
        cur = mirror(base);
        for (let i = 0; i < 4; i++) {
            variants.push(cur);
            cur = rotate(cur);
        }

        const keys = variants.map(v =>
            normalize(v).map(b => `${b.r},${b.c}`).join(';')
        );
        keys.sort();
        return keys[0];
    }

    // 判断 4 个格子是否全部连通
    function isConnected(cells) {
        if (cells.length !== SHAPE_CELLS) return false;
        const set = new Set(cells.map(s => `${s.r},${s.c}`));
        const queue = [cells[0]];
        const visited = new Set([`${cells[0].r},${cells[0].c}`]);
        const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
        while (queue.length) {
            const { r, c } = queue.shift();
            for (const [dr, dc] of dirs) {
                const key = `${r + dr},${c + dc}`;
                if (set.has(key) && !visited.has(key)) {
                    visited.add(key);
                    queue.push({ r: r + dr, c: c + dc });
                }
            }
        }
        return visited.size === SHAPE_CELLS;
    }

    function isDuplicate(blocks) {
        const key = canonicalKey(blocks);
        return library.some(s => s.shapeKey === key);
    }

    // 渲染制作区
    function renderCreator() {
        creatorGrid.innerHTML = '';
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const isSel = selectedCells.some(s => s.r === r && s.c === c);
                if (isSel) {
                    cell.classList.add('selected');
                    cell.textContent = '✓';
                }
                cell.addEventListener('click', () => toggleCell(r, c));
                creatorGrid.appendChild(cell);
            }
        }
    }

    function toggleCell(r, c) {
        const idx = selectedCells.findIndex(s => s.r === r && s.c === c);
        if (idx === -1) {
            if (selectedCells.length >= SHAPE_CELLS) {
                toast(`最多只能选择 ${SHAPE_CELLS} 个方格`, true);
                return;
            }
            selectedCells.push({ r, c });
        } else {
            selectedCells.splice(idx, 1);
        }
        renderCreator();
    }

    function saveShape() {
        if (library.length >= MAX_SHAPES) {
            toast(`❌ 图形库已达上限（最多 ${MAX_SHAPES} 种四连方）`, true);
            return;
        }
        if (selectedCells.length !== SHAPE_CELLS) {
            toast('❌ 请选择 4 个相邻的格子', true);
            return;
        }
        if (!isConnected(selectedCells)) {
            toast('❌ 4 个格子必须相互连通', true);
            return;
        }
        const blocks = normalize(selectedCells);
        if (isDuplicate(blocks)) {
            toast('❌ 图形库中已有相同形状（含旋转/镜像）', true);
            return;
        }
        library.push({
            id: Date.now() + '_' + Math.random(),
            color: nextColor(),
            blocks: blocks.map(b => ({ ...b })),
            shapeKey: canonicalKey(blocks)
        });
        selectedCells = [];
        renderCreator();
        renderLibrary();
        toast(`✅ 新图形已珍藏 (${library.length}/${MAX_SHAPES})`);
    }

    function clearCreator() {
        selectedCells = [];
        renderCreator();
    }

    function deleteShape(id) {
        library = library.filter(s => s.id !== id);
        renderLibrary();
        toast('图形已删除');
    }

    // 渲染图形库
    function renderLibrary() {
        libraryCounter.textContent = `${library.length} / ${MAX_SHAPES}`;
        libraryContainer.innerHTML = '';

        if (!library.length) {
            const empty = document.createElement('div');
            empty.className = 'library-empty';
            empty.textContent = '还没有保存的四连方，去左侧制作一个吧～';
            libraryContainer.appendChild(empty);
            return;
        }

        const grid = document.createElement('div');
        grid.className = 'library-grid';

        library.forEach(shape => {
            const card = document.createElement('div');
            card.className = 'shape-card';

            const maxR = Math.max(...shape.blocks.map(b => b.r));
            const maxC = Math.max(...shape.blocks.map(b => b.c));
            const rows = maxR + 1;
            const cols = maxC + 1;

            const mini = document.createElement('div');
            mini.className = 'shape-mini';
            mini.style.gridTemplateColumns = `repeat(${cols}, 40px)`;
            mini.style.gridTemplateRows = `repeat(${rows}, 40px)`;

            const filled = new Set(shape.blocks.map(b => `${b.r},${b.c}`));
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const mc = document.createElement('div');
                    mc.className = 'mini-cell';
                    if (filled.has(`${r},${c}`)) {
                        mc.classList.add('filled');
                        mc.style.background = shape.color;
                    }
                    mini.appendChild(mc);
                }
            }
            card.appendChild(mini);

            const del = document.createElement('button');
            del.className = 'delete-btn';
            del.textContent = '×';
            del.title = '删除该图形';
            del.addEventListener('click', () => deleteShape(shape.id));
            card.appendChild(del);

            grid.appendChild(card);
        });

        libraryContainer.appendChild(grid);
    }

    saveShapeBtn.addEventListener('click', saveShape);
    clearCreatorBtn.addEventListener('click', clearCreator);

    renderCreator();
    renderLibrary();
})();
</script>
</body>
</html>
